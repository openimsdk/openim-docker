# ============================================
# BNFChat - 常聊 Docker Compose 配置
# 生产环境标准部署（方案 B）
# ============================================

networks:
  openim:
    driver: bridge
  dokploy-network:
    external: true

services:
  mongo:
    image: "${MONGO_IMAGE}"
    container_name: mongo
    command: >
      bash -c '
        docker-entrypoint.sh mongod --wiredTigerCacheSizeGB $$wiredTigerCacheSizeGB --auth &
        until mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval "db.runCommand({ ping: 1 })" &>/dev/null; do
          echo "Waiting for MongoDB to start..."
          sleep 1
        done &&
        mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval "
        db = db.getSiblingDB(\"$$MONGO_INITDB_DATABASE\");
        if (!db.getUser(\"$$MONGO_OPENIM_USERNAME\")) {
          db.createUser({
            user: \"$$MONGO_OPENIM_USERNAME\",
            pwd: \"$$MONGO_OPENIM_PASSWORD\",
            roles: [{role: \"readWrite\", db: \"$$MONGO_INITDB_DATABASE\"}]
          });
          print(\"User created successfully: \");
          print(\"Username: $$MONGO_OPENIM_USERNAME\");
          print(\"Password: $$MONGO_OPENIM_PASSWORD\");
          print(\"Database: $$MONGO_INITDB_DATABASE\");
        } else {
          print(\"User already exists in database: $$MONGO_INITDB_DATABASE, Username: $$MONGO_OPENIM_USERNAME\");
        }
        " &&
        tail -f /dev/null
        '
    volumes:
      - "${DATA_DIR}/components/mongodb/data/db:/data/db"
      - "${DATA_DIR}/components/mongodb/data/logs:/data/logs"
      - "${DATA_DIR}/components/mongodb/data/conf:/etc/mongo"
    environment:
      - TZ=Asia/Shanghai
      - wiredTigerCacheSizeGB=1
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=openIM123
      - MONGO_INITDB_DATABASE=openim_v3
      - MONGO_OPENIM_USERNAME=${MONGO_USERNAME}
      - MONGO_OPENIM_PASSWORD=${MONGO_PASSWORD}
    restart: always
    networks:
      - openim
      - dokploy-network

  redis:
    image: "${REDIS_IMAGE}"
    container_name: redis
    volumes:
      - "${DATA_DIR}/components/redis/data:/data"
      - "${DATA_DIR}/components/redis/config/redis.conf:/usr/local/redis/config/redis.conf"
    environment:
      TZ: Asia/Shanghai
    restart: always
    sysctls:
      net.core.somaxconn: 1024
    command:
      [
        "redis-server",
        "/usr/local/redis/config/redis.conf",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--appendonly",
        "yes",
      ]
    networks:
      - openim
      - dokploy-network

  etcd:
    image: "${ETCD_IMAGE}"
    container_name: etcd
    ports:
      - "12379:2379"
      - "12380:2380"
    environment:
      - ETCD_NAME=s1
      - ETCD_DATA_DIR=/etcd-data
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_CLUSTER=s1=http://0.0.0.0:2380
      - ETCD_INITIAL_CLUSTER_TOKEN=tkn
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ALLOW_NONE_AUTHENTICATION=no
    volumes:
      - "${DATA_DIR}/components/etcd:/etcd-data"
    command: >
      /bin/sh -c '
        etcd &
        export ETCDCTL_API=3
        echo "Waiting for etcd to become healthy..."
        until etcdctl --endpoints=http://127.0.0.1:2379 endpoint health &>/dev/null; do
          echo "Waiting for ETCD to start..."
          sleep 1
        done
        echo "etcd is healthy."
        tail -f /dev/null
      '
    restart: always
    networks:
      - openim
      - dokploy-network

  kafka:
    image: "${KAFKA_IMAGE}"
    container_name: kafka
    user: root
    restart: always
    volumes:
      - "${DATA_DIR}/components/kafka:/bitnami/kafka"
    environment:
      TZ: Asia/Shanghai
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://kafka:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "INTERNAL"
    networks:
      - openim
      - dokploy-network

  minio:
    image: "${MINIO_IMAGE}"
    ports:
      - "9000:9000"
      - "9090:9090"
    container_name: minio
    volumes:
      - "${DATA_DIR}/components/mnt/data:/data"
      - "${DATA_DIR}/components/mnt/config:/root/.minio"
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY_ID}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_ACCESS_KEY}"
    restart: always
    command: minio server /data --console-address ':9090'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bnfchat-minio.rule=Host(`download.bnfchain.top`)"
      - "traefik.http.routers.bnfchat-minio.entrypoints=websecure"
      - "traefik.http.routers.bnfchat-minio.tls=true"
      - "traefik.http.routers.bnfchat-minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.bnfchat-minio.loadbalancer.server.port=9000"
    networks:
      - openim
      - dokploy-network

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: prometheus
    restart: always
    user: root
    profiles:
      - m
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/instance-down-rules.yml:/etc/prometheus/instance-down-rules.yml
      - ${DATA_DIR}/components/prometheus/data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.listen-address=:${PROMETHEUS_PORT}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bnfchat-prometheus.rule=Host(`prometheus.bnfchain.top`)"
      - "traefik.http.routers.bnfchat-prometheus.entrypoints=websecure"
      - "traefik.http.routers.bnfchat-prometheus.tls=true"
      - "traefik.http.routers.bnfchat-prometheus.tls.certresolver=letsencrypt"
      - "traefik.http.services.bnfchat-prometheus.loadbalancer.server.port=${PROMETHEUS_PORT}"
    networks:
      - openim
      - dokploy-network

  alertmanager:
    image: ${ALERTMANAGER_IMAGE}
    container_name: alertmanager
    restart: always
    profiles:
      - m
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./config/email.tmpl:/etc/alertmanager/email.tmpl
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--web.listen-address=:${ALERTMANAGER_PORT}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bnfchat-alertmanager.rule=Host(`alertmanager.bnfchain.top`)"
      - "traefik.http.routers.bnfchat-alertmanager.entrypoints=websecure"
      - "traefik.http.routers.bnfchat-alertmanager.tls=true"
      - "traefik.http.routers.bnfchat-alertmanager.tls.certresolver=letsencrypt"
      - "traefik.http.services.bnfchat-alertmanager.loadbalancer.server.port=${ALERTMANAGER_PORT}"
    networks:
      - openim
      - dokploy-network

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana
    user: root
    restart: always
    profiles:
      - m
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SESSION_COOKIE_SAMESITE=none
      - GF_SESSION_COOKIE_SECURE=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SERVER_HTTP_PORT=${GRAFANA_PORT}
    volumes:
      - ${DATA_DIR:-./}/components/grafana:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bnfchat-grafana.rule=Host(`grafana.bnfchain.top`)"
      - "traefik.http.routers.bnfchat-grafana.entrypoints=websecure"
      - "traefik.http.routers.bnfchat-grafana.tls=true"
      - "traefik.http.routers.bnfchat-grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.bnfchat-grafana.loadbalancer.server.port=${GRAFANA_PORT}"
    networks:
      - openim
      - dokploy-network

  openim-web-front:
    image: ${OPENIM_WEB_FRONT_IMAGE}
    container_name: openim-web-front
    restart: always
    ports:
      - "${OPENIM_WEB_FRONT_PORT}:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bnfchat-web.rule=Host(`www.bnfchain.top`)"
      - "traefik.http.routers.bnfchat-web.entrypoints=websecure"
      - "traefik.http.routers.bnfchat-web.tls=true"
      - "traefik.http.routers.bnfchat-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.bnfchat-web.loadbalancer.server.port=80"
    networks:
      - openim
      - dokploy-network

  openim-admin-front:
    image: ${OPENIM_ADMIN_FRONT_IMAGE}
    container_name: openim-admin-front
    restart: always
    ports:
      - "${OPENIM_ADMIN_FRONT_PORT}:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bnfchat-admin.rule=Host(`chat-admin.bnfchain.top`)"
      - "traefik.http.routers.bnfchat-admin.entrypoints=websecure"
      - "traefik.http.routers.bnfchat-admin.tls=true"
      - "traefik.http.routers.bnfchat-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.bnfchat-admin.loadbalancer.server.port=80"
    networks:
      - openim
      - dokploy-network

  openim-server:
    image: ${OPENIM_SERVER_IMAGE}
    container_name: openim-server
    init: true
    ports:
      - "${OPENIM_MSG_GATEWAY_PORT}:10001"
      - "${OPENIM_API_PORT}:10002"
    healthcheck:
      test: ["CMD", "sh", "-c", "mage check"]
      interval: 5s
      timeout: 60s
      retries: 10
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bnfchat-api.rule=Host(`api.bnfchain.top`)"
      - "traefik.http.routers.bnfchat-api.entrypoints=websecure"
      - "traefik.http.routers.bnfchat-api.tls=true"
      - "traefik.http.routers.bnfchat-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.bnfchat-api.loadbalancer.server.port=${OPENIM_API_PORT}"
    environment:
      - IMENV_MONGODB_ADDRESS=${MONGO_ADDRESS}
      - IMENV_MONGODB_USERNAME=${MONGO_USERNAME}
      - IMENV_MONGODB_PASSWORD=${MONGO_PASSWORD}
      - IMENV_KAFKA_ADDRESS=${KAFKA_ADDRESS}
      - IMENV_KAFKA_USERNAME=${KAFKA_USERNAME}
      - IMENV_KAFKA_PASSWORD=${KAFKA_PASSWORD}
      - IMENV_DISCOVERY_ETCD_ADDRESS=${ETCD_ADDRESS}
      - IMENV_REDIS_ADDRESS=${REDIS_ADDRESS}
      - IMENV_REDIS_PASSWORD=${REDIS_PASSWORD}
      - IMENV_DISCOVERY_ETCD_USERNAME=${ETCD_USERNAME}
      - IMENV_DISCOVERY_ETCD_PASSWORD=${ETCD_PASSWORD}
      - IMENV_MINIO_INTERNALADDRESS=${MINIO_INTERNAL_ADDRESS}
      - IMENV_MINIO_EXTERNALADDRESS=${MINIO_EXTERNAL_ADDRESS}
      - IMENV_MINIO_ACCESSKEYID=${MINIO_ACCESS_KEY_ID}
      - IMENV_MINIO_SECRETACCESSKEY=${MINIO_SECRET_ACCESS_KEY}
      - IMENV_SHARE_SECRET=${OPENIM_SECRET}
      - IMENV_LOG_ISSTDOUT=${LOG_IS_STDOUT}
      - IMENV_LOG_REMAINLOGLEVEL=${LOG_LEVEL}
      - IMENV_OPENIM_API_PROMETHEUS_GRAFANAURL=${GRAFANA_URL}
    restart: always
    depends_on:
      - mongo
      - redis
      - etcd
      - kafka
      - minio
    networks:
      - openim
      - dokploy-network

  openim-chat:
    image: ${OPENIM_CHAT_IMAGE}
    container_name: openim-chat
    init: true
    healthcheck:
      test: ["CMD", "sh", "-c", "mage check"]
      interval: 5s
      timeout: 60s
      retries: 10
    environment:
      - CHATENV_MONGODB_ADDRESS=${MONGO_ADDRESS}
      - CHATENV_MONGODB_USERNAME=${MONGO_USERNAME}
      - CHATENV_MONGODB_PASSWORD=${MONGO_PASSWORD}
      - CHATENV_DISCOVERY_ETCD_ADDRESS=${ETCD_ADDRESS}
      - CHATENV_REDIS_ADDRESS=${REDIS_ADDRESS}
      - CHATENV_REDIS_PASSWORD=${REDIS_PASSWORD}
      - CHATENV_SHARE_OPENIM_SECRET=${OPENIM_SECRET}
      - CHATENV_DISCOVERY_ETCD_USERNAME=${ETCD_USERNAME}
      - CHATENV_DISCOVERY_ETCD_PASSWORD=${ETCD_PASSWORD}
      - CHATENV_SHARE_OPENIM_APIURL=${API_URL}
      - CHATENV_LOG_ISSTDOUT=${LOG_IS_STDOUT}
      - CHATENV_LOG_REMAINLOGLEVEL=${LOG_LEVEL}
    ports:
      - "${CHAT_API_PORT}:10008"
      - "${ADMIN_API_PORT}:10009"
    restart: always
    depends_on:
      - mongo
      - redis
      - etcd
      - kafka
      - minio
      - openim-server
    networks:
      - openim
      - dokploy-network
